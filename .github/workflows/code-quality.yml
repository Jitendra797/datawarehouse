name: Code Quality Checks

on:
  push:
    branches: [main, test-workflow]
  pull_request:
    branches: [main]

jobs:
  code-quality:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check export patterns
        run: |
          npx ts-node -e "
            const files = glob.sync('app/**/*.tsx');
            files.forEach(file => {
              const content = fs.readFileSync(file, 'utf8');
              if (content.includes('export const') || !content.includes('export function')) {
                throw new Error(`${file} must use 'export function' pattern`);
              }
            });"

      - name: Run ESLint
        run: npx eslint . --ext .ts,.tsx

      - name: Run Prettier
        run: npm run format

      - name: Check formatting
        run: npx prettier --check "app/**/*.tsx" --config .prettierrc

      - name: Check naming conventions
        run: |
          npx ts-node -e "
            const files = glob.sync('app/**/*.tsx');
            files.forEach(file => {
              const content = fs.readFileSync(file, 'utf8');
              const exportMatches = content.match(/export function (\w+)/g);
              if (exportMatches) {
                exportMatches.forEach(match => {
                   const functionName = match.replace('export function ', '');
                   if (!/^[a-z][a-zA-Z0-9]*$/.test(functionName)) {
                      throw new Error(`Function ${functionName} in ${file} must use camelCase`);
                   }
                });
             }
           });"
