name: Code Quality Checks

on:
  push:
    branches: [main, test-workflow]
  pull_request:
    branches: [main]

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 1. Check Export Function Pattern
      - name: Check export patterns
        run: |
          npx ts-node -e "
            const glob = require('glob');
            const fs = require('fs');
            const files: string[] = glob.sync('app/**/*.tsx');
            let hasError: boolean = false;

            files.forEach((file: string) => {
              const content: string = fs.readFileSync(file, 'utf8');
              
              // Check for arrow function exports
              const hasArrowFunction = content.match(/export\s+const\s+\w+\s*=\s*(\(\)|[\w\s,]*)\s*=>/);
              
              // Check for non-exported functions
              const hasNonExportedFunction = content.match(/^function\s+[A-Z]\w*|const\s+[A-Z]\w*\s*=/m);
              
              // Check for proper export function pattern
              const hasProperExport = content.match(/export\s+function\s+[A-Z]\w*\s*\(/);
              
              if (hasArrowFunction) {
                console.error(`${file}: Uses arrow function instead of 'export function'`);
                hasError = true;
              }
              
              if (hasNonExportedFunction) {
                console.error(`${file}: Contains function that should use 'export function'`);
                hasError = true;
              }
              
              if (!hasProperExport && (hasArrowFunction || hasNonExportedFunction)) {
                console.error(`${file}: Missing proper 'export function' pattern`);
                hasError = true;
              }
            });

            if (hasError) {
              process.exit(1);
            }
          "

      # 2. Check State Variable Comments
      - name: Check state variable comments
        run: |
          npx ts-node -e "
            const glob = require('glob');
            const fs = require('fs');
            const files = glob.sync('app/**/*.tsx');
            let hasError = false;

            files.forEach(file => {
              const content = fs.readFileSync(file, 'utf8');
              const stateDeclarations = content.match(/const\s+\[\w+,\s*set\w+\]\s*=\s*useState[<\w*>]*\(/g);
              
              if (stateDeclarations) {
                stateDeclarations.forEach(declaration => {
                  const contentBeforeState = content.substring(0, content.indexOf(declaration));
                  const lines = contentBeforeState.split('\n');
                  
                  // Look for comments in previous lines
                  let hasComment = false;
                  let i = lines.length - 1;
                  
                  while (i >= 0) {
                    const line = lines[i].trim();
                    
                    // Check for single-line comment
                    if (line.startsWith('//')) {
                      hasComment = true;
                      break;
                    }
                    
                    // Check for multi-line comment end
                    if (line.includes('*/')) {
                      while (i >= 0) {
                        if (lines[i].trim().includes('/*')) {
                          hasComment = true;
                          break;
                        }
                        i--;
                      }
                      break;
                    }
                    
                    // Stop if we hit non-empty, non-comment line
                    if (line !== '' && !line.startsWith('*')) {
                      break;
                    }
                    
                    i--;
                  }

                  const stateName = declaration.match(/const\s+\[(\w+)/)[1];
                  
                  if (!hasComment) {
                    console.error(
                      `${file}: State variable '${stateName}' missing comment.\n` +
                      `Add either:\n` +
                      `// Description of what this state does\n` +
                      `or\n` +
                      `/*\n` +
                      ` * Description of what this state does\n` +
                      ` */`
                    );
                    hasError = true;
                  }
                });
              }
            });

            if (hasError) {
              process.exit(1);
            }
          "

      # 3. ESLint and Prettier Checks
      - name: Install ESLint
        run: npm install eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin --save-dev

      - name: Run ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0

      - name: Check Prettier Formatting
        run: |
          npm install prettier --save-dev
          npx prettier --check "app/**/*.{ts,tsx}"

      # 4. Check Naming Conventions (camelCase)
      - name: Check naming conventions
        run: |
          npx ts-node -e "
            const glob = require('glob');
            const fs = require('fs');
            const files = glob.sync('app/**/*.tsx');
            let hasError = false;

            function isCamelCase(str) {
              return /^[a-z][a-zA-Z0-9]*$/.test(str);
            }

            files.forEach(file => {
              const content = fs.readFileSync(file, 'utf8');
              
              // Check variable declarations
              const varDeclarations = content.match(/(?:const|let|var)\s+([a-zA-Z]\w*)\s*=/g);
              if (varDeclarations) {
                varDeclarations.forEach(declaration => {
                  const varName = declaration.replace(/(?:const|let|var)\s+/, '').replace(/\s*=/, '');
                  if (!isCamelCase(varName)) {
                    console.error(`${file}: Variable ${varName} is not camelCase`);
                    hasError = true;
                  }
                });
              }

              // Check function declarations
              const functionDeclarations = content.match(/function\s+([a-zA-Z]\w*)/g);
              if (functionDeclarations) {
                functionDeclarations.forEach(declaration => {
                  const funcName = declaration.replace('function ', '');
                  if (!isCamelCase(funcName)) {
                    console.error(`${file}: Function ${funcName} is not camelCase`);
                    hasError = true;
                  }
                });
              }
            });

            if (hasError) {
              process.exit(1);
            }
          "
