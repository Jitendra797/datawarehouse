name: Code Quality Checks

on:
  push:
    branches: [main, test-workflow]
  pull_request:
    branches: [main]

jobs:
  code-quality:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check export patterns
        run: |
          npx ts-node -e "
            const glob = require('glob');
            const fs = require('fs');
            const files = glob.sync('app/**/*.tsx');
            let hasError = false;
            
            files.forEach(file => {
              const content = fs.readFileSync(file, 'utf8');
              if (content.includes('export const') || 
                  content.match(/function\s+[A-Z][a-zA-Z0-9]*/) ||
                  !content.includes('export function')) {
                console.error(`${file} has export pattern violations`);
                hasError = true;
              }
            });
            
            if (hasError) {
              process.exit(1);
            }
          "

      - name: Run ESLint
        run: npx eslint . --ext .ts,.tsx

      - name: Run Prettier
        run: npm run format

      - name: Check formatting
        run: npx prettier --check "app/**/*.tsx" --config .prettierrc

      - name: Check naming conventions
        run: |
          npx ts-node -e "
            const glob = require('glob');
            const fs = require('fs');
            const files = glob.sync('app/**/*.tsx');
            let hasError = false;
            
            function isCamelCase(str) {
              return /^[a-z][a-zA-Z0-9]*$/.test(str);
            }
            
            files.forEach(file => {
              const content = fs.readFileSync(file, 'utf8');
              const functionMatches = content.match(/export function ([a-zA-Z0-9]+)/g);
              
              if (functionMatches) {
                functionMatches.forEach(match => {
                  const functionName = match.replace('export function ', '');
                  if (!isCamelCase(functionName)) {
                    console.error(`${file}: Function ${functionName} is not camelCase`);
                    hasError = true;
                  }
                });
              }
            });
            
            if (hasError) {
              process.exit(1);
            }
          "
